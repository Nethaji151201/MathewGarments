<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/mathewgarment.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>
      Mathew Garments - Best Men's & Boys Clothing Showroom in Tamil Nadu
    </title>
    <meta
      name="title"
      content="Mathew Garments - Best Men's & Boys Clothing Showroom in Tamil Nadu"
    />
    <meta
      name="description"
      content="Mathew Garments offers the best men's wear and boys clothing across Tamil Nadu. Visit our showrooms for stylish shirts, pants, traditional wear, and more at affordable prices."
    />

    <!-- Keywords (less powerful but still useful) -->
    <meta
      name="keywords"
      content="best men's clothing, boys clothing, garments shop Tamil Nadu, men's wear showroom, kids wear shop, Mathew Garments, clothing store near me"
    />

    <!-- Author -->
    <meta name="author" content="Mathew Garments" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (for social media) -->
    <meta
      property="og:title"
      content="Mathew Garments - Best Men's & Boys Clothing Store"
    />
    <meta
      property="og:description"
      content="Shop the latest men's fashion and boys clothing in Tamil Nadu. Visit Mathew Garments showrooms near you."
    />
    <meta property="og:image" content="/mathewgarment.png" />
    <meta property="og:url" content="https://mathewgarments.vercel.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Mathew Garments - Best Men's & Boys Wear"
    />
    <meta
      name="twitter:description"
      content="Top quality men's and boys clothing in Tamil Nadu."
    />
    <meta name="twitter:image" content="/mathewgarment.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://mathewgarments.vercel.com" />

    <!-- Theme color -->
    <meta name="theme-color" content="#000000" />

    <!-- Structured Data (VERY IMPORTANT 🔥) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ClothingStore",
        "name": "Mathew Garments",
        "image": "https://yourdomain.com/mathewgarment.png",
        "url": "https://yourdomain.com",
        "telephone": "+91-XXXXXXXXXX",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Tamil Nadu",
          "addressCountry": "IN"
        },
        "sameAs": ["https://www.instagram.com/", "https://www.facebook.com/"]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
